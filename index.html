<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>2차 조 소개 - KFA Motif</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e38cc3e09cc3f7a43d6600c59335019b&libraries=services"></script>

    <style>
        :root {
            --kfa-blue: #002b5e;
            --kfa-red: #e31837;
            --bg-gray: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Noto Sans KR", sans-serif; }
        body { background: var(--bg-gray); color: #333; line-height: 1.6; }
        a { text-decoration: none; transition: 0.3s; }

        /* HEADER */
        #header {
            position: fixed; top: 0; width: 100%; background: white;
            border-bottom: 3px solid var(--kfa-blue); z-index: 9999;
        }
        .top {
            max-width: 1200px; height: 80px; margin: auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .main_logo { font-size: 24px; font-weight: 900; color: var(--kfa-blue); }
        .menu { display: flex; list-style: none; gap: 5px; }
        .menu a { color: #333; font-weight: 600; padding: 10px 15px; border-radius: 8px; font-size: 14px; }
        .menu a:hover { background: var(--kfa-blue); color: white; }

        #contents { padding-top: 80px; }

        /* SLIDER */
        .news_slide { overflow: hidden; position: relative; width: 100%; max-height: 500px; }
        .slider-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .img_slide { min-width: 100%; }
        .img_slide img { width: 100%; height: 500px; object-fit: cover; }
        .slider-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 15px; z-index: 10;
        }
        .slider-btn {
            width: 35px; height: 35px; border: none; border-radius: 50%;
            background: rgba(0,0,0,0.6); color: white; cursor: pointer;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; }
        .dot.active { background: var(--kfa-red); width: 25px; border-radius: 10px; }

        /* SECTION */
        .custom-section { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .kfa-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; border-left: 6px solid var(--kfa-blue); padding-left: 15px; }
        .custom-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* INTRO GRID */
        .intro-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .team-member { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .team-member:hover { transform: translateY(-10px); }
        .member-img { width: 100%; height: 250px; object-fit: cover; }
        .team-info { padding: 15px; text-align: center; }
        .team-info h3 { color: var(--kfa-red); margin-bottom: 5px; }

        /* PITCH (STYLING IMPROVED) */
        .formation-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .player-bench {
            width: 180px; background: #eee; border-radius: 15px; padding: 20px;
            display: flex; flex-direction: column; gap: 30px; align-items: center; min-height: 450px;
        }
        .football-pitch {
            flex: 1; min-width: 350px; height: 500px;
            background-color: #45a049;
            background-image: 
                linear-gradient(rgba(255,255,255,0.3) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.3) 2px, transparent 2px);
            background-size: 50px 50px;
            border: 5px solid white; border-radius: 10px; position: relative;
        }
        /* 축구장 중앙선 효과 */
        .football-pitch::before {
            content: ''; position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.5);
        }

        .player-icon {
            width: 65px; height: 65px; border-radius: 50%; border: 3px solid white;
            position: relative; cursor: grab; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .player-icon img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .player-icon span {
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            background: var(--kfa-blue); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap;
        }

        /* UTILS */
        .kfa-btn { padding: 12px 25px; border: none; background: var(--kfa-blue); color: white; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .kfa-btn:hover { background: var(--kfa-red); }
        .kfa-input { padding: 12px; border-radius: 8px; border: 2px solid #ddd; outline: none; transition: 0.3s; }
        .kfa-input:focus { border-color: var(--kfa-blue); }

        footer { background: #1a1a1a; color: white; text-align: center; padding: 50px 20px; margin-top: 80px; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { max-width: 85%; max-height: 85%; border: 5px solid white; }
    </style>
</head>

<body>
    <div id="header">
        <div class="top">
            <div class="main_logo">⚽ KFA MOTIF TEAM 4</div>
            <ul class="menu">
                <li><a href="#intro">조 소개</a></li>
                <li><a href="#geolocation">위치</a></li>
                <li><a href="#drag-drop">포메이션</a></li>
                <li><a href="#web-storage">방명록</a></li>
            </ul>
        </div>
    </div>

    <div id="contents">
        <div class="news_slide">
            <div class="slider-wrapper">
                <div class="img_slide"><img src="main.png" alt="Main 1"></div>
                <div class="img_slide"><img src="main2.png" alt="Main 2"></div>
            </div>
            <div class="slider-controls">
                <button class="slider-btn" onclick="moveSlide(-1)">❮</button>
                <div class="dots-container">
                    <span class="dot active" onclick="currentSlide(0)"></span>
                    <span class="dot" onclick="currentSlide(1)"></span>
                </div>
                <button class="slider-btn" onclick="moveSlide(1)">❯</button>
            </div>
        </div>

        <div id="intro" class="custom-section">
            <h2 class="kfa-title">조원 소개</h2>
            <div class="intro-grid">
                <div class="team-member">
                    <img src="member1.png" class="member-img">
                    <div class="team-info"><h3>안정민</h3><p>No.1 팀장</p></div>
                </div>
                <div class="team-member">
                    <img src="member2.png" class="member-img">
                    <div class="team-info"><h3>공채연</h3><p>No.7 팀원</p></div>
                </div>
                <div class="team-member">
                    <img src="member3.png" class="member-img">
                    <div class="team-info"><h3>홍준표</h3><p>No.2 팀원</p></div>
                </div>
                <div class="team-member">
                    <img src="member4.png" class="member-img">
                    <div class="team-info"><h3>안의찬</h3><p>No.11 팀원</p></div>
                </div>
            </div>
        </div>

        <div id="geolocation" class="custom-section">
            <h2 class="kfa-title">주변 풋살장 찾기</h2>
            <div class="custom-box">
                <button class="kfa-btn" onclick="initKakaoMap()">📍 내 위치 주변 검색하기</button>
                <div id="kakao-map" style="width:100%;height:400px;margin-top:20px;border-radius:15px; background: #eee;"></div>
                <div id="place-list" style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>
        </div>

        <div id="drag-drop" class="custom-section">
            <h2 class="kfa-title">오늘의 포메이션</h2>
            <div class="formation-container">
                <div class="player-bench" ondrop="dropToBench(event)" ondragover="allowDrop(event)">
                    <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p1">
                        <img src="member1.png"><span>안정민</span>
                    </div>
                    <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p2">
                        <img src="member2.png"><span>공채연</span>
                    </div>
                    <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p3">
                        <img src="member3.png"><span>홍준표</span>
                    </div>
                    <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p4">
                        <img src="member4.png"><span>안의찬</span>
                    </div>
                </div>
                <div class="football-pitch" ondrop="dropToPitch(event)" ondragover="allowDrop(event)">
                    </div>
            </div>
        </div>

        <div id="web-storage" class="custom-section">
            <h2 class="kfa-title">방명록</h2>
            <div class="custom-box" style="text-align:center;">
                <input type="text" id="username" class="kfa-input" placeholder="이름을 입력하세요">
                <button class="kfa-btn" onclick="saveName()">등록</button>
                <button class="kfa-btn" style="background:#777;" onclick="clearName()">삭제</button>
                <div id="greeting-msg" style="margin-top:20px; font-size:20px; font-weight:bold; color:var(--kfa-red);"></div>
            </div>
        </div>
    </div>

    <footer>
        <h2>⚽ TEAM 4 | KFA MOTIF PROJECT</h2>
        <p style="opacity: 0.6; margin-top:10px;">Copyright ⓒ 2024 Team4. All Rights Reserved.</p>
    </footer>

    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        /* --- Slider --- */
        let slideIndex = 0;
        function showSlide(n) {
            const slides = document.querySelectorAll('.img_slide');
            const dots = document.querySelectorAll('.dot');
            if (n >= slides.length) slideIndex = 0;
            else if (n < 0) slideIndex = slides.length - 1;
            else slideIndex = n;
            document.querySelector('.slider-wrapper').style.transform = `translateX(-${slideIndex * 100}%)`;
            dots.forEach(d => d.classList.remove('active'));
            dots[slideIndex].classList.add('active');
        }
        function moveSlide(n) { showSlide(slideIndex + n); }
        function currentSlide(n) { showSlide(n); }
        setInterval(() => moveSlide(1), 5000);

        /* --- Kakao Map --- */
        function initKakaoMap() {
            if (!navigator.geolocation) return alert("위치 정보를 사용할 수 없습니다.");
            
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                const container = document.getElementById('kakao-map');
                const locPosition = new kakao.maps.LatLng(lat, lng);
                const map = new kakao.maps.Map(container, { center: locPosition, level: 5 });

                // 현재 위치 마커
                new kakao.maps.Marker({ map, position: locPosition });

                const ps = new kakao.maps.services.Places();
                ps.keywordSearch('풋살장', (data, status) => {
                    if (status === kakao.maps.services.Status.OK) {
                        const listEl = document.getElementById('place-list');
                        listEl.innerHTML = '';
                        data.forEach(place => {
                            const markerPos = new kakao.maps.LatLng(place.y, place.x);
                            new kakao.maps.Marker({ map, position: markerPos });
                            
                            const div = document.createElement('div');
                            div.style = "padding:10px; background:#f9f9f9; border-radius:8px; cursor:pointer; font-size:13px; border:1px solid #ddd";
                            div.innerHTML = `<b>${place.place_name}</b><br><small>${place.address_name}</small>`;
                            div.onclick = () => map.panTo(markerPos);
                            listEl.appendChild(div);
                        });
                    }
                }, { location: locPosition, radius: 5000 });
            });
        }

        /* --- Drag & Drop --- */
        let offsetX = 0, offsetY = 0;
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            const rect = ev.target.getBoundingClientRect();
            offsetX = ev.clientX - rect.left;
            offsetY = ev.clientY - rect.top;
        }
        function dropToPitch(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const player = document.getElementById(data);
            const pitch = ev.currentTarget.getBoundingClientRect();
            
            player.style.position = 'absolute';
            player.style.left = (ev.clientX - pitch.left - offsetX) + 'px';
            player.style.top = (ev.clientY - pitch.top - offsetY) + 'px';
            ev.currentTarget.appendChild(player);
        }
        function dropToBench(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const player = document.getElementById(data);
            player.style.position = 'relative';
            player.style.left = '0'; player.style.top = '0';
            ev.currentTarget.appendChild(player);
        }

        /* --- Storage --- */
        function saveName() {
            const val = document.getElementById('username').value;
            if(!val) return alert("이름을 써주세요!");
            localStorage.setItem("team4_user", val);
            loadGreeting();
        }
        function clearName() {
            localStorage.removeItem("team4_user");
            loadGreeting();
        }
        function loadGreeting() {
            const user = localStorage.getItem("team4_user");
            document.getElementById('greeting-msg').innerText = user ? `어서오세요, ${user}님! ⚽` : "";
        }
        window.onload = loadGreeting;
    </script>
</body>
</html>
