<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>2차 조 소개 - KFA Motif</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e38cc3e09cc3f7a43d6600c59335019b&libraries=services"></script>
    
    <style>
        /* 기본 리셋 */
        *, body { font-family: "Noto Sans KR", sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        a { text-decoration: none; color: inherit; }

        /* 헤더 & 섹션 공통 */
        #header { position: fixed; top: 0; width: 100%; z-index: 999; background: #fff; border-bottom: 2px solid #002b5e; height: 80px; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 20px; }
        .custom-section { max-width: 1200px; margin: 100px auto 50px; padding: 0 20px; }
        .kfa-title { font-size: 28px; font-weight: 700; border-left: 6px solid #e31837; padding-left: 15px; margin-bottom: 30px; }

        /* 조원 소개 (그대로 유지) */
        .intro-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .team-member { flex: 1; min-width: 200px; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; text-align: center; }
        .member-img { width: 100%; height: auto; }
        .team-info { padding: 15px; }

        /* ✅ 축구장 (라인 복구) */
        .football-pitch { 
            position: relative; flex: 1; min-width: 300px; height: 450px; 
            background-color: #2e7d32; border: 4px solid #fff; border-radius: 10px; 
            overflow: hidden; 
        }
        /* 중앙선 */
        .football-pitch::before {
            content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%;
            background: rgba(255, 255, 255, 0.8); transform: translateX(-50%);
        }
        /* 센터 서클 */
        .football-pitch::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 90px; height: 90px;
            border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        /* 페널티 박스 (상/하) */
        .box-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 180px; height: 60px; border: 2px solid #fff; border-top: none; }
        .box-bottom { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 180px; height: 60px; border: 2px solid #fff; border-bottom: none; }

        /* 지도 UI */
        #kakao-map { width: 100%; height: 400px; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; }
        .kfa-btn { background: #002b5e; color: #fff; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* 포메이션 드래그앤드롭 */
        .formation-container { display: flex; gap: 20px; }
        .player-bench { width: 120px; border: 2px dashed #ccc; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .player-icon { width: 60px; height: 60px; border-radius: 50%; cursor: grab; position: relative; z-index: 10; }
        .player-icon img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #e31837; }
    </style>
</head>
<body>

<div id="header">
    <div class="nav-container">
        <div style="font-weight:900; font-size:24px; color:#002b5e;">KFA Motif</div>
        <nav>
            <a href="#intro" style="margin-left:20px;">조 소개</a>
            <a href="#geolocation" style="margin-left:20px;">위치</a>
            <a href="#drag-drop" style="margin-left:20px;">포메이션</a>
        </nav>
    </div>
</div>

<div id="intro" class="custom-section">
    <h2 class="kfa-title">조원 소개</h2>
    <div class="intro-grid">
        <div class="team-member"><img src="member1.png" class="member-img"><div class="team-info"><h3>안정민</h3><p>Captain</p></div></div>
        <div class="team-member"><img src="member2.png" class="member-img"><div class="team-info"><h3>공채연</h3><p>Member</p></div></div>
        <div class="team-member"><img src="member3.png" class="member-img"><div class="team-info"><h3>홍준표</h3><p>Member</p></div></div>
        <div class="team-member"><img src="member4.png" class="member-img"><div class="team-info"><h3>안의찬</h3><p>Member</p></div></div>
    </div>
</div>

<div id="geolocation" class="custom-section">
    <h2 class="kfa-title">주변 풋살장 찾기</h2>
    <button class="kfa-btn" onclick="startLocationSearch()">📍 현재 위치 기반 검색 시작</button>
    <div id="kakao-map"></div>
</div>

<div id="drag-drop" class="custom-section">
    <h2 class="kfa-title">축구 포메이션 설정</h2>
    <div class="formation-container">
        <div class="player-bench" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p1"><img src="member1.png"></div>
            <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p2"><img src="member2.png"></div>
            <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p3"><img src="member3.png"></div>
            <div class="player-icon" draggable="true" ondragstart="drag(event)" id="p4"><img src="member4.png"></div>
        </div>
        <div class="football-pitch" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div class="box-top"></div>
            <div class="box-bottom"></div>
        </div>
    </div>
</div>

<script>
    // ✅ 지도 로직: 지연 실행 방지 및 직접 호출
    var map;
    var ps;

    function startLocationSearch() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                var loc = new kakao.maps.LatLng(lat, lng);

                var mapContainer = document.getElementById('kakao-map');
                var mapOption = { center: loc, level: 4 };
                map = new kakao.maps.Map(mapContainer, mapOption);

                // 마커 표시
                new kakao.maps.Marker({ map: map, position: loc });

                // 풋살장 검색
                ps = new kakao.maps.services.Places();
                ps.keywordSearch('풋살장', placesSearchCB, { location: loc, radius: 5000 });
            });
        } else {
            alert("위치 정보를 사용할 수 없습니다.");
        }
    }

    function placesSearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            for (var i=0; i<data.length; i++) {
                new kakao.maps.Marker({
                    map: map,
                    position: new kakao.maps.LatLng(data[i].y, data[i].x)
                });
            }
        }
    }

    // 드래그 앤 드롭 로직 (유지)
    function allowDrop(e) { e.preventDefault(); }
    function drag(e) { e.dataTransfer.setData("text", e.target.id); }
    function drop(e) {
        e.preventDefault();
        var data = e.dataTransfer.getData("text");
        var player = document.getElementById(data);
        if (e.target.classList.contains('football-pitch')) {
            var rect = e.target.getBoundingClientRect();
            player.style.position = 'absolute';
            player.style.left = (e.clientX - rect.left - 30) + 'px';
            player.style.top = (e.clientY - rect.top - 30) + 'px';
            e.target.appendChild(player);
        } else {
            player.style.position = 'relative';
            player.style.left = '0'; player.style.top = '0';
            e.target.appendChild(player);
        }
    }
</script>

</body>
</html>
