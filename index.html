<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>2차 조 소개 - KFA Motif</title>

    <!-- favicon 404 방지 -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- 카카오맵 -->
    <script
        src="https://dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey=e38cc3e09cc3f7a43d6600c59335019b&libraries=services"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans KR", sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #333;
        }

        a {
            text-decoration: none;
        }

        /* HEADER */
        #header {
            position: fixed;
            top: 0;
            width: 100%;
            background: white;
            border-bottom: 2px solid #002b5e;
            z-index: 9999;
        }

        .top {
            max-width: 1200px;
            height: 80px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .main_logo {
            font-size: 28px;
            font-weight: 900;
            color: #002b5e;
        }

        .menu {
            display: flex;
            list-style: none;
            gap: 10px;
        }

        .menu a {
            color: #333;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #002b5e;
            color: white;
        }

        #contents {
            padding-top: 80px;
        }

        /* SLIDER */
        .news_slide {
            overflow: hidden;
            position: relative;
        }

        .slider-wrapper {
            display: flex;
            transition: transform 0.5s ease;
        }

        .img_slide {
            min-width: 100%;
        }

        .img_slide img {
            width: 100%;
            display: block;
        }

        .slider-controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            cursor: pointer;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            display: inline-block;
            cursor: pointer;
        }

        .dot.active {
            background: #e31837;
        }

        /* SECTION */
        .custom-section {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .kfa-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            border-bottom: 2px solid #111;
            padding-bottom: 15px;
        }

        .custom-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        /* TEAM */
        .intro-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
        }

        .team-member {
            flex: 1;
            min-width: 220px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .team-member:hover {
            transform: translateY(-5px);
        }

        .member-img {
            width: 100%;
            display: block;
        }

        .team-info {
            padding: 20px;
            text-align: center;
        }

        .team-info h3 {
            color: #e31837;
            margin-bottom: 10px;
        }

        /* TEAM SHOT */
        .team-shot-card {
            width: 250px;
            height: 300px;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .team-shot-card:hover {
            transform: scale(1.03);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        /* MAP */
        .kfa-btn {
            padding: 12px 24px;
            border: none;
            background: #002b5e;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .place-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #002b5e;
            cursor: pointer;
        }

        .place-card:hover {
            border-left-color: #e31837;
        }

        /* FORMATION */
        .formation-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .player-bench {
            width: 160px;
            background: white;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .football-pitch {
            flex: 1;
            min-width: 300px;
            height: 450px;
            background: green;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        .player-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        .player-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-icon span {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
        }

        /* STORAGE */
        .kfa-input {
            padding: 12px;
            width: 300px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* MEDIA */
        .media-grid {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .media-box {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 15px;
            padding: 25px;
        }

        video,
        audio {
            width: 100%;
        }

        /* FOOTER */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 60px 20px;
            margin-top: 80px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div id="header">
        <div class="top">
            <div class="main_logo">⚽ TEAM 4</div>

            <ul class="menu">
                <li><a href="#team-shots">단체샷</a></li>
                <li><a href="#intro">조 소개</a></li>
                <li><a href="#geolocation">위치</a></li>
                <li><a href="#drag-drop">포메이션</a></li>
                <li><a href="#web-storage">방명록</a></li>
            </ul>
        </div>
    </div>

    <div id="contents">

        <!-- SLIDER -->
        <div class="news_slide">

            <div class="slider-wrapper">
                <div class="img_slide">
                    <img src="main.png">
                </div>

                <div class="img_slide">
                    <img src="main2.png">
                </div>
            </div>

            <div class="slider-controls">
                <button class="slider-btn" onclick="moveSlide(-1)">❮</button>

                <div>
                    <span class="dot active" onclick="currentSlide(0)"></span>
                    <span class="dot" onclick="currentSlide(1)"></span>
                </div>

                <button class="slider-btn" onclick="moveSlide(1)">❯</button>
            </div>

        </div>

        <!-- TEAM SHOTS -->
        <div id="team-shots" class="custom-section">

            <h2 class="kfa-title">우리 조 단체샷</h2>

            <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">

                <div class="team-shot-card"
                    style="background-image:url('shoot1.jpeg')"
                    onclick="openModal('shoot1.jpeg')"></div>

                <div class="team-shot-card"
                    style="background-image:url('shoot2.jpeg')"
                    onclick="openModal('shoot2.jpeg')"></div>

                <div class="team-shot-card"
                    style="background-image:url('shoot3.jpeg')"
                    onclick="openModal('shoot3.jpeg')"></div>

                <div class="team-shot-card"
                    style="background-image:url('shoot4.png')"
                    onclick="openModal('shoot4.png')"></div>

            </div>
        </div>

        <!-- MODAL -->
        <div id="imageModal" class="modal" onclick="closeModal(event)">
            <span class="close-modal">&times;</span>
            <img class="modal-content" id="modalImage">
        </div>

        <!-- TEAM -->
        <div id="intro" class="custom-section">

            <h2 class="kfa-title">조원 소개</h2>

            <div class="intro-grid">

                <div class="team-member">
                    <img src="member1.png" class="member-img">
                    <div class="team-info">
                        <h3>안정민</h3>
                        <p>No.1 팀장</p>
                    </div>
                </div>

                <div class="team-member">
                    <img src="member2.png" class="member-img">
                    <div class="team-info">
                        <h3>공채연</h3>
                        <p>No.7 팀원</p>
                    </div>
                </div>

                <div class="team-member">
                    <img src="member3.png" class="member-img">
                    <div class="team-info">
                        <h3>홍준표</h3>
                        <p>No.2 팀원</p>
                    </div>
                </div>

                <div class="team-member">
                    <img src="member4.png" class="member-img">
                    <div class="team-info">
                        <h3>안의찬</h3>
                        <p>No.11 팀원</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- MAP -->
        <div id="geolocation" class="custom-section">

            <h2 class="kfa-title">위치 정보 & 주변 풋살장</h2>

            <div class="custom-box">

                <button class="kfa-btn" onclick="initKakaoMap()">
                    📍 내 위치 찾기
                </button>

                <div id="kakao-map"
                    style="width:100%;height:450px;margin-top:20px;border-radius:15px;"></div>

                <div id="place-list" style="margin-top:20px;"></div>

            </div>
        </div>

        <!-- FORMATION -->
        <div id="drag-drop" class="custom-section">

            <h2 class="kfa-title">축구 포메이션</h2>

            <div class="formation-container">

                <div class="player-bench"
                    ondrop="dropPlayerBench(event)"
                    ondragover="allowDrop(event)">

                    <div class="player-icon"
                        draggable="true"
                        ondragstart="dragPlayer(event)"
                        id="player1">

                        <img src="member1.png">
                        <span>안정민</span>
                    </div>

                    <div class="player-icon"
                        draggable="true"
                        ondragstart="dragPlayer(event)"
                        id="player2">

                        <img src="member2.png">
                        <span>공채연</span>
                    </div>

                    <div class="player-icon"
                        draggable="true"
                        ondragstart="dragPlayer(event)"
                        id="player3">

                        <img src="member3.png">
                        <span>홍준표</span>
                    </div>

                    <div class="player-icon"
                        draggable="true"
                        ondragstart="dragPlayer(event)"
                        id="player4">

                        <img src="member4.png">
                        <span>안의찬</span>
                    </div>

                </div>

                <div class="football-pitch"
                    ondrop="dropPlayerOnPitch(event)"
                    ondragover="allowDrop(event)">
                </div>

            </div>
        </div>

        <!-- STORAGE -->
        <div id="web-storage" class="custom-section">

            <h2 class="kfa-title">방명록</h2>

            <div class="custom-box">

                <input type="text"
                    id="username"
                    class="kfa-input"
                    placeholder="이름 입력">

                <button class="kfa-btn" onclick="saveName()">
                    저장
                </button>

                <button class="kfa-btn"
                    style="background:#777;"
                    onclick="clearName()">
                    초기화
                </button>

                <div id="greeting-msg"
                    style="margin-top:20px;font-size:24px;color:#e31837;font-weight:bold;">
                </div>

            </div>
        </div>

        <!-- MEDIA -->
        <div id="media" class="custom-section">

            <h2 class="kfa-title">미디어</h2>

            <div class="media-grid">

                <div class="media-box">

                    <h3>홍보 영상</h3>

                    <video controls>
                        <source src="video.mp4" type="video/mp4">
                    </video>

                </div>

                <div class="media-box">

                    <h3>BGM</h3>

                    <audio controls autoplay loop>
                        <source src="Song.mp3" type="audio/mpeg">
                    </audio>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <h2>⚽ TEAM 4</h2>
        <p style="margin-top:15px;">
            Copyright ⓒ Team4
        </p>
    </footer>

    <script>

        /* =========================
           카카오맵
        ========================= */

        let kakaoMap = null;

function initKakaoMap() {

    if (!navigator.geolocation) {
        alert("위치 서비스를 지원하지 않습니다.");
        return;
    }

    navigator.geolocation.getCurrentPosition(function (position) {

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        // ✅ SDK 로딩 완료 후 실행
        kakao.maps.load(function () {

                    const container =
                        document.getElementById('kakao-map');
        
                    const options = {
                        center: new kakao.maps.LatLng(lat, lng),
                        level: 4
                    };
        
                    kakaoMap =
                        new kakao.maps.Map(container, options);
        
                    // 내 위치 마커
                    const marker = new kakao.maps.Marker({
                        position: new kakao.maps.LatLng(lat, lng)
                    });
        
                    marker.setMap(kakaoMap);
        
                    // 장소 검색
                    const ps =
                        new kakao.maps.services.Places();
        
                    ps.keywordSearch(
                        '풋살장',
                        function (data, status) {
        
                            if (
                                status !==
                                kakao.maps.services.Status.OK
                            ) {
                                return;
                            }
        
                            const list =
                                document.getElementById('place-list');
        
                            list.innerHTML = '';
        
                            data.forEach(function (place) {
        
                                const marker =
                                    new kakao.maps.Marker({
                                        map: kakaoMap,
                                        position:
                                            new kakao.maps.LatLng(
                                                place.y,
                                                place.x
                                            )
                                    });
        
                                const div =
                                    document.createElement('div');
        
                                div.className = 'place-card';
        
                                div.innerHTML = `
                                    <strong>${place.place_name}</strong><br>
                                    ${place.address_name}
                                `;
        
                                div.onclick = function () {
        
                                    kakaoMap.panTo(
                                        new kakao.maps.LatLng(
                                            place.y,
                                            place.x
                                        )
                                    );
                                };
        
                                list.appendChild(div);
                            });
                        },
                        {
                            location:
                                new kakao.maps.LatLng(lat, lng),
                            radius: 5000
                        }
                    );
                });
        
            });
        }

        function placesSearchCB(data, status) {

            if (status !== kakao.maps.services.Status.OK) {
                return;
            }

            const list = document.getElementById('place-list');
            list.innerHTML = '';

            data.forEach(function (place) {

                const marker = new kakao.maps.Marker({
                    map: kakaoMap,
                    position: new kakao.maps.LatLng(place.y, place.x)
                });

                const div = document.createElement('div');

                div.className = 'place-card';

                div.innerHTML = `
                    <strong>${place.place_name}</strong><br>
                    ${place.address_name}
                `;

                div.onclick = function () {

                    kakaoMap.panTo(
                        new kakao.maps.LatLng(place.y, place.x)
                    );

                };

                list.appendChild(div);

            });

        }

        /* =========================
           DRAG & DROP
        ========================= */

        let offsetX = 0;
        let offsetY = 0;

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function dragPlayer(ev) {

            const player = ev.target.closest('.player-icon');

            ev.dataTransfer.setData("text", player.id);

            const rect = player.getBoundingClientRect();

            offsetX = ev.clientX - rect.left;
            offsetY = ev.clientY - rect.top;
        }

        function dropPlayerOnPitch(ev) {

            ev.preventDefault();

            const data = ev.dataTransfer.getData("text");

            const player = document.getElementById(data);

            const rect = ev.currentTarget.getBoundingClientRect();

            player.style.position = 'absolute';

            player.style.left =
                (ev.clientX - rect.left - offsetX) + 'px';

            player.style.top =
                (ev.clientY - rect.top - offsetY) + 'px';

            ev.currentTarget.appendChild(player);
        }

        function dropPlayerBench(ev) {

            ev.preventDefault();

            const data = ev.dataTransfer.getData("text");

            const player = document.getElementById(data);

            player.style.position = 'relative';
            player.style.left = '0';
            player.style.top = '0';

            ev.currentTarget.appendChild(player);
        }

        /* =========================
           WEB STORAGE
        ========================= */

        function saveName() {

            const name =
                document.getElementById('username').value;

            if (!name.trim()) {
                alert("이름 입력");
                return;
            }

            localStorage.setItem(
                "teamVisitorName",
                name
            );

            displayGreeting();
        }

        function clearName() {

            localStorage.removeItem("teamVisitorName");

            document.getElementById('username').value = '';

            displayGreeting();
        }

        function displayGreeting() {

            const saved =
                localStorage.getItem("teamVisitorName");

            document.getElementById('greeting-msg').innerText =
                saved
                    ? `환영합니다 ${saved}님 ⚽`
                    : '';
        }

        /* =========================
           SLIDER
        ========================= */

        let slideIndex = 0;

        function showSlide(n) {

            const wrapper =
                document.querySelector('.slider-wrapper');

            const slides =
                document.querySelectorAll('.img_slide');

            const dots =
                document.querySelectorAll('.dot');

            if (n >= slides.length) slideIndex = 0;
            else if (n < 0) slideIndex = slides.length - 1;
            else slideIndex = n;

            wrapper.style.transform =
                `translateX(-${slideIndex * 100}%)`;

            dots.forEach(dot => dot.classList.remove('active'));

            dots[slideIndex].classList.add('active');
        }

        function moveSlide(n) {
            showSlide(slideIndex + n);
        }

        function currentSlide(n) {
            showSlide(n);
        }

        setInterval(function () {
            moveSlide(1);
        }, 5000);

        /* =========================
           MODAL
        ========================= */

        function openModal(src) {

            document.getElementById('imageModal').style.display = 'flex';

            document.getElementById('modalImage').src = src;
        }

        function closeModal(event) {

            if (
                event.target.id === 'imageModal' ||
                event.target.className === 'close-modal'
            ) {

                document.getElementById('imageModal').style.display = 'none';
            }
        }

        /* INIT */
        window.onload = function () {
            displayGreeting();
        };

    </script>

</body>

</html>
